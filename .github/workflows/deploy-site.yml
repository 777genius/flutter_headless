name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Dart pub global path
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      # --- Docs (needs workspace: key temporarily) ---

      - name: Install dartdoc_modern
        run: dart pub global activate dartdoc_modern

      - name: Add workspace key for docs generation
        run: |
          cat >> pubspec.yaml << 'WORKSPACE'

          workspace:
            - packages/headless
            - packages/headless_foundation
            - packages/headless_contracts
            - packages/headless_tokens
            - packages/headless_theme
            - packages/headless_material
            - packages/headless_cupertino
            - packages/headless_adaptive
            - packages/headless_test
            - packages/anchored_overlay_engine
            - packages/components/headless_button
            - packages/components/headless_checkbox
            - packages/components/headless_switch
            - packages/components/headless_dropdown_button
            - packages/components/headless_textfield
            - packages/components/headless_autocomplete
          WORKSPACE

      - name: Generate docs
        run: >
          dart pub global run dartdoc_modern
          --format jaspr
          --workspace-docs
          --exclude-packages 'example,headless_cli,liquid_glass_apple'
          --guide-exclude='implementation/.*,competitors/.*,v1_decisions/.*,ru/.*,en/.*,contributors/.*,CONFORMANCE\.md,SPEC_V1\.md,MUST\.md,ARCHITECTURE\.md,RESEARCH\.md,ITERATION_PLAN.*,FLEXIBLE_PRESETS.*'
          --output docs-site

      - name: Remove legacy guide redirect files
        run: find docs-site/web/guide -name '*.html' -delete 2>/dev/null || true

      - name: Remove workspace key
        run: git checkout pubspec.yaml

      - name: Install docs dependencies
        working-directory: docs-site
        run: dart pub get

      - name: Build docs (jaspr)
        working-directory: docs-site
        run: dart run jaspr_cli:jaspr build --dart-define DOCS_BASE_PATH=/flutter_headless
        timeout-minutes: 10

      # --- Demo app ---

      - name: Install workspace tooling
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Build demo app
        working-directory: apps/example
        run: flutter build web --release --base-href /flutter_headless/demo/
        timeout-minutes: 10

      # --- Combine into single artifact ---

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r docs-site/build/jaspr/* _site/
          mkdir -p _site/demo
          cp -r apps/example/build/web/* _site/demo/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
