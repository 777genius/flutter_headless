name: headless

packages:
  - packages/**
  - apps/**
  - tools/**

ignore:
  - "**/build/**"
  - "**/.dart_tool/**"

command:
  bootstrap:
    runPubGetInParallel: false

scripts:
  analyze:
    run: melos exec -- dart analyze .

  test:dart:
    run: melos exec --fail-fast -- "dart test"
    packageFilters:
      flutter: false

  test:flutter:
    run: melos exec --fail-fast --concurrency=1 -- "flutter test --exclude-tags golden"
    packageFilters:
      flutter: true

  test:golden:
    run: dart run tools/headless_cli/bin/run_golden_tests.dart

  test:integration:
    run: dart run tools/headless_cli/bin/run_integration_tests.dart

  test:integration:web:
    run: dart run tools/headless_cli/bin/run_integration_tests.dart chrome --include-web

  test:browser:
    run: melos exec --scope headless_example -- "flutter test --platform chrome browser_test"

  test:
    run: melos run test:dart && melos run test:flutter

  format:
    run: melos exec -- dart format --output=none --set-exit-if-changed .

  update-goldens:
    run: melos exec --fail-fast --concurrency=1 -- "flutter test --update-goldens"
    description: Re-generate golden image files for all Flutter packages.
    packageFilters:
      flutter: true
      dirExists: test/

  guardrails:
    run: dart run tools/headless_cli/bin/guardrails.dart

  release:guardrails:
    run: dart run tools/headless_cli/bin/release_guardrails.dart

  release:dry-run:
    run: dart run tools/headless_cli/bin/publish_dry_run.dart

  release:publish:
    run: dart run tools/headless_cli/bin/publish_release.dart

  release:check:
    run: dart run melos bootstrap && dart run melos run analyze && dart run melos run test && dart run melos run test:browser && dart run melos run test:golden && dart run melos run test:integration && dart run melos run release:guardrails && dart run melos run release:dry-run
