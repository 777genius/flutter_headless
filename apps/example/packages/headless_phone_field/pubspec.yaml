name: headless_phone_field
description: Headless phone input adapted from phone_form_field for the Headless architecture.
version: 0.1.0
publish_to: none
homepage: https://github.com/777genius/flutter_headless
repository: https://github.com/777genius/flutter_headless
issue_tracker: https://github.com/777genius/flutter_headless/issues

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  headless_contracts:
    path: ../../../../packages/headless_contracts
  headless_foundation:
    path: ../../../../packages/headless_foundation
  headless_textfield:
    path: ../../../../packages/components/headless_textfield
  flutter_country_selector: ^1.0.19
  phone_numbers_parser: ^9.0.21

dev_dependencies:
  flutter_test:
    sdk: flutter
  headless_material:
    path: ../../../../packages/headless_material
  headless_theme:
    path: ../../../../packages/headless_theme
  headless_test:
    path: ../../../../packages/headless_test
  lints: ^5.1.1

dependency_overrides:
  anchored_overlay_engine:
    path: ../../../../packages/anchored_overlay_engine
  headless_contracts:
    path: ../../../../packages/headless_contracts
  headless_foundation:
    path: ../../../../packages/headless_foundation
  headless_test:
    path: ../../../../packages/headless_test
  headless_textfield:
    path: ../../../../packages/components/headless_textfield
  headless_theme:
    path: ../../../../packages/headless_theme
  headless_tokens:
    path: ../../../../packages/headless_tokens
